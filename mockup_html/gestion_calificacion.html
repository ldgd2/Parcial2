<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Calificar Servicio (Móvil 1:1)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'], 
                    },
                    colors: {
                        flPrimary: '#0EA5E9',
                        flBackground: '#020617',
                        flSurface: '#0F172A',
                        flTextPrimary: '#F8FAFC',
                        flTextSecondary: '#CBD5E1',
                        flTextMuted: '#94A3B8',
                        flBorder: '#334155',
                        flSuccess: '#10B981',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        /* Device Mockup Wrapper */
        .device-mockup {
            width: 375px;
            height: 812px; /* iPhone X dimensions */
            background-color: #020617; /* flBackground */
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 0 8px #1E293B;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: #F8FAFC; /* flTextPrimary */
        }

        /* Fake Notch */
        .device-notch {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background-color: #1E293B;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 50;
        }

        /* Status Bar */
        .status-bar {
            height: 44px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            font-size: 13px;
            font-weight: 500;
            z-index: 40;
            position: relative;
        }

        /* Hide scrollbar for the scrollable area */
        .scrollable::-webkit-scrollbar { display: none; }
        .scrollable { -ms-overflow-style: none; scrollbar-width: none; }

        .star-rating svg { transition: transform 0.1s, color 0.2s; cursor: pointer; }
        .star-rating svg:active { transform: scale(0.85); }
    </style>
</head>
<body>

    <!-- Device Frame -->
    <div class="device-mockup">
        <div class="device-notch"></div>
        
        <!-- Status Bar -->
        <div class="status-bar">
            <span>9:41</span>
            <div class="flex gap-1.5 items-center">
                <i data-lucide="signal-high" class="w-3.5 h-3.5"></i>
                <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
                <i data-lucide="battery-full" class="w-4 h-4"></i>
            </div>
        </div>

        <!-- Flutter App Bar -->
        <div class="h-14 flex items-center px-4 bg-flBackground z-10 relative">
            <button class="w-10 h-10 flex items-center justify-center rounded-full active:bg-white/10 transition-colors">
                <i data-lucide="arrow-left" class="w-6 h-6 text-flTextPrimary"></i>
            </button>
            <h1 class="text-xl font-medium ml-2 text-flTextPrimary text-center flex-1 pr-10">Calificar Servicio</h1>
        </div>

        <!-- App Content -->
        <div class="flex-1 scrollable overflow-y-auto bg-flBackground pb-24">
            
            <!-- Success Hero -->
            <div class="pt-6 pb-4 flex flex-col items-center">
                <div class="w-20 h-20 bg-[#064E3B] rounded-full flex items-center justify-center mb-4">
                    <i data-lucide="check" class="w-10 h-10 text-flSuccess"></i>
                </div>
                <h2 class="text-2xl font-bold text-flTextPrimary">¡Servicio Finalizado!</h2>
                <p class="text-flTextMuted mt-2 text-center px-8 text-sm leading-relaxed">
                    Tu emergencia #EM-2041 ha sido resuelta con éxito.
                </p>
            </div>

            <!-- Card Taller -->
            <div class="mx-4 mb-4 bg-flSurface rounded-xl border border-flBorder overflow-hidden">
                <div class="p-4">
                    <h3 class="text-flTextSecondary text-sm font-medium mb-4">¿Cómo calificarías al Taller?</h3>
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-12 h-12 rounded-lg bg-flPrimary/10 flex items-center justify-center">
                            <i data-lucide="wrench" class="w-6 h-6 text-flPrimary"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-base text-flTextPrimary">Taller AutoMec</h4>
                            <p class="text-xs text-flTextMuted">Reparación de Motor</p>
                        </div>
                    </div>

                    <!-- Stars Taller -->
                    <div class="flex justify-center gap-3 py-2 star-rating text-[#F59E0B]">
                        <i data-lucide="star" class="w-10 h-10 fill-[#F59E0B]"></i>
                        <i data-lucide="star" class="w-10 h-10 fill-[#F59E0B]"></i>
                        <i data-lucide="star" class="w-10 h-10 fill-[#F59E0B]"></i>
                        <i data-lucide="star" class="w-10 h-10 fill-[#F59E0B]"></i>
                        <i data-lucide="star" class="w-10 h-10 text-flBorder"></i>
                    </div>
                </div>
            </div>

            <!-- Card Técnico -->
            <div class="mx-4 mb-4 bg-flSurface rounded-xl border border-flBorder overflow-hidden">
                <div class="p-4">
                    <h3 class="text-flTextSecondary text-sm font-medium mb-4">¿Cómo fue la atención del Técnico?</h3>
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-12 h-12 rounded-full bg-flPrimary/20 flex items-center justify-center text-flPrimary font-bold border border-flPrimary/30">
                            JP
                        </div>
                        <div>
                            <h4 class="font-bold text-base text-flTextPrimary">Juan Pérez</h4>
                            <p class="text-xs text-flTextMuted">Atención en sitio</p>
                        </div>
                    </div>

                    <!-- Stars Tecnico -->
                    <div class="flex justify-center gap-3 py-2 star-rating text-[#F59E0B]">
                        <i data-lucide="star" class="w-10 h-10 fill-[#F59E0B]"></i>
                        <i data-lucide="star" class="w-10 h-10 fill-[#F59E0B]"></i>
                        <i data-lucide="star" class="w-10 h-10 fill-[#F59E0B]"></i>
                        <i data-lucide="star" class="w-10 h-10 fill-[#F59E0B]"></i>
                        <i data-lucide="star" class="w-10 h-10 fill-[#F59E0B]"></i>
                    </div>
                </div>
            </div>

            <!-- Reseña Textarea -->
            <div class="mx-4 mb-6">
                <div class="bg-flSurface rounded-xl border border-flBorder overflow-hidden">
                    <textarea rows="3" placeholder="Comentarios adicionales (opcional)..." 
                        class="w-full bg-transparent p-4 text-sm text-flTextPrimary placeholder:text-flTextMuted focus:outline-none resize-none"></textarea>
                </div>
            </div>

        </div>

        <!-- Bottom Action Bar (Sticky) -->
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-flBackground border-t border-flBorder pt-4 pb-8 z-20">
            <button class="w-full h-14 bg-flPrimary text-white rounded-lg font-semibold text-base flex items-center justify-center active:bg-[#0284C7] transition-colors">
                Enviar Calificación
            </button>
            <button class="w-full h-12 bg-transparent text-flPrimary font-medium text-sm mt-1 active:bg-flPrimary/10 rounded-lg transition-colors">
                Omitir por ahora
            </button>
        </div>

    </div>

    <!-- Initialize Lucide Icons -->
    <script>
      lucide.createIcons();
    </script>
</body>
</html>

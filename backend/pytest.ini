[pytest]
# ─── CONFIGURACIÓN GENERAL ──────────────────────────────────────

# Paths donde buscar tests
testpaths = tests

# Patrones de archivos a reconocer como tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# ─── ASYNCIO ─────────────────────────────────────────────────────

asyncio_mode = auto

# ─── VERBOSIDAD ──────────────────────────────────────────────────

# Nivel de detalle
# -v: verbose (muestra cada test)
# -vv: very verbose
# --tb=short: traceback corto
# --tb=long: traceback completo
addopts = 
    -v 
    --tb=short
    --strict-markers
    -ra

# ─── COBERTURA ───────────────────────────────────────────────────

# Ejecutar con cobertura:
# pytest --cov=app --cov-report=html
# pytest --cov=app --cov-report=term-missing

# ─── MARCADORES PERSONALIZADOS ──────────────────────────────────

markers =
    unit: Tests unitarios (rápidos, sin BD)
    integration: Tests de integración (con BD simulada)
    asyncio: Tests asincronos
    slow: Tests lentos (>1s)
    skip_ci: Tests que se saltan en CI/CD
    flaky: Tests inestables

# ─── TIMEOUT ──────────────────────────────────────────────────────

# Opcional: timeout para tests
# timeout = 10
# timeout_method = thread

# ─── LOGGING ──────────────────────────────────────────────────────

log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG

# ─── FORMATEO ─────────────────────────────────────────────────────

# Formato de salida
console_output_style = progress

# ─── DESCUBRIMIENTO ───────────────────────────────────────────────

# No incluir estos directorios en el descubrimiento
norecursedirs = 
    .git 
    __pycache__ 
    .venv 
    venv 
    dist 
    build 
    *.egg
    node_modules
